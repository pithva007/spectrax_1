name: 🐛 Bug Report
description: Report a bug or unexpected behavior in SpectraX
title: "[BUG]: "
labels: ["bug", "gssoc-26"]
body:

  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug! 🚀

        Please fill out the details carefully so maintainers can reproduce and fix the issue faster.

  - type: textarea
    id: description
    attributes:
      label: 📝 Bug Description
      description: Clearly describe the issue you encountered.
      placeholder: Explain what is happening...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔄 Steps To Reproduce
      description: Provide step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll to '...'
        4. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: Describe what you expected to happen.
      placeholder: The application should...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: Describe what actually happened.
      placeholder: Instead, the application...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots / Screen Recording
      description: Add screenshots or recordings if applicable.

  - type: dropdown
    id: browser
    attributes:
      label: 🌐 Browser
      description: Select the browser where the issue occurred.
      options:
        - Chrome
        - Firefox
        - Edge
        - Safari
        - Brave
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 💻 Operating System
      description: Mention your operating system.
      placeholder: Windows 11, Ubuntu 22.04, macOS Sonoma

  - type: input
    id: node
    attributes:
      label: 📦 Node.js Version
      description: Mention your Node.js version if applicable.
      placeholder: v20.x.x

  - type: textarea
    id: additional
    attributes:
      label: 📌 Additional Context
      description: Add any additional information related to the issue.